name: Sync finger-rules to Cloudmap

on:
  push:
    branches: [main, master]
    paths:
      - "**/*.yaml"
      - "**/*.yml"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout finger-rules repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Build and push payload
        env:
          CLOUDMAP_FINGER_RULES_SYNC_URL: ${{ secrets.CLOUDMAP_FINGER_RULES_SYNC_URL }}
          CLOUDMAP_FINGER_RULES_WEBHOOK_SECRET: ${{ secrets.CLOUDMAP_FINGER_RULES_WEBHOOK_SECRET }}
        run: |
          python .github/scripts/finger_rules_payload.py \
            --repo-dir . \
            --commit-sha "$GITHUB_SHA" \
            --post-url "$CLOUDMAP_FINGER_RULES_SYNC_URL" \
            --secret "$CLOUDMAP_FINGER_RULES_WEBHOOK_SECRET"
