- name: ASUS-Router
  matchers:
    - part: title
      type: word
      words:
        - "ASUS Login"
    - part: title
      type: regex
      name: mode
      group: 3
      regex:
        - "ASUS (.*) (router|Router) (.*)"
- name: ASUS-ZenWiFi-AX
  matchers:
    - part: body
      type: word
      words:
        - '<div class="prod_madelName">ZenWiFi AX</div>'
- name: wl_520gu
  vendor: asus
  matchers:
    - part: body
      type: word
      condition: and
      words:
        - "ASUS"
        - "WL-520GU"
        - "return 'Connected"