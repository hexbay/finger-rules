- name: Java
  matchers:
    - part: headers.server
      type: regex
      name: version
      regex:
        - java/([\d\.\w-]+)
    - part: header
      type: word
      words:
        - "jsessionid"
        
- name: JSP
  matchers:
    - part: headers.x-powered-by
      type: regex
      name: version
      regex:
        - JSP(?:\/([\d\.]+))