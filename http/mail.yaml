- name: Mail-Server
  matchers:
    - part: title
      type: word
      words:
        - "IceWARP"
    - part: headers.server
      words:
        - IceWarp
      type: word
    - name: version
      part: headers.server
      regex:
        - ^IceWarp\/(.+)$
      type: regex

- matchers:
  - part: title
    type: word
    words:
      - "SmarterMail"
  name: SmarterMail

- name: raidenmaild
  vendor: raidenmaild
  matchers:
    - part: body
      type: word
      words:
        - "RaidenMAILD"

- name: smtp4dev
  vendor: rnwood
  matchers:
    - part: title
      type: word
      words:
        - "smtp4dev"