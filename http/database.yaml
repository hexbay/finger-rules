- name: Metabase
  matchers:
    - part: title
      type: word
      words:
        - Metabase
- name: bigant_database
  vendor: bigantsoft
  matchers-condition: or
  matchers:
    - part: title
      type: word
      words:
        - BigAntSetup
    - part: body
      type: word
      condition: and
      words:
        - BigAnt Database Upgrade Wizard
        - //DB-MS

- name: Dgraph
  vendor: dgraph
  matchers:
    - part: title
      type: word
      words:
        - Dgraph
- name: eXist-DB
  vendor: exist-db
  matchers:
    - part: title
      type: word
      words:
        - "eXist db"