- name: ownCloud
  matchers:
    - part: title
      type: word
      words:
          - "ownCloud"
- name: gohire
  vendor: gohire
  matchers:
    - part: body
      type: word
      words:
          - "You may have followed an invalid link or the job you are looking for has been archived"
- name: softr
  matchers:
    - part: body
      type: word
      condition: or
      words:
          - "The application you were looking for was built on Softr"
          - "Get started with Softr"
- name: Gitpod
  vendor: gitpod
  matchers-condition: and
  matchers:
    - part: body
      type: word
      words:
        - "FROM"
        - "gitpod"
      condition: and
    - part: header
      type: word
      words:
        - "text/html"
      negative: true