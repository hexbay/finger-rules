- name: DrayTek-Vigor-Router
  matchers:
    - part: cert
      type: word
      condition: and
      words:
          - "CN=Vigor Router"
          - "OU=DrayTek Support"
    - part: title
      type: word
      words:
        - "Vigor"
    - part: body
      type: word
      condition: and
      words:
        - "excanvas.js"
        - "detectLang"
    - part: headers.server
      type: word
      words:
        - "DWS"
- name: VigorConnect
  matchers:
    - part: title
      type: word
      words:
        - "VigorConnect"