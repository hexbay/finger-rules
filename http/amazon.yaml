- name: AWS-EC2
  matchers:
    - part: headers.server
      type: word
      words:
        - "EC2ws"
- matchers:
    - part: headers.server
      regex:
        - ^ecs
      type: regex
    - part: title
      type: word
      words:
        - "Amazon ECS"
  name: Amazon-ECS
- matchers:
    - part: headers.set-cookie
      type: word
      words:
        - AWSALB
        - AWSALBCORS
  name: Amazon-ALB

- matchers:
    - part: headers.via
      words:
        - (cloudfront)
      type: word
  name: Amazon-Cloudfront

- matchers:
    - part: headers.server
      type: word
      words:
        - awselb
  name: Amazon-ELB
- matchers:
    - part: headers.server
      words:
        - AmazonS3
      type: word
  name: AWS-S3

- matchers-condition: and
  matchers:
    - part: body
      type: word
      condition: and
      words:
        - "version:"
        - "phases:"
        - "build:"
    - part: header
      type: word
      condition: or
      words:
        - "text/yaml"
        - "text/plain"
        - "application/x-yaml"
  name: AWS-CodeBuild-Buildspec
  vendor: amazon
