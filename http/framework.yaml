- name: ZK-framework
  matchers:
    - part: title
      type: word
      words:
        - "Server backup manager"
- name: qwik
  matchers:
    - part: body
      type: word
      words:
        - "q:container"
        - "qwikloader"
      condition: or
- name: laravel_ignition
  vendor: spatie
  matchers:
    - part: body
      type: word
      words:
        - "/_ignition/"
        - "Ignition"
      condition: and